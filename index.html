<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的專屬翻頁時鐘 (Flip Clock)</title>
    <style>
        /* 1. 全螢幕黑夜背景 */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            background-color: #0f172a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        /* 2. 響應式時鐘外層包裹 */
        .clock-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 95vw; 
            max-width: 900px;
            gap: 1.5vw; 
        }

        /* 時、分、秒卡片組 */
        .card-group {
            display: flex;
            gap: 0.6vw;
        }

        /* 3. 核心 3D 卡片容器 */
        .flip-card {
            position: relative;
            width: 12vw; 
            max-width: 100px;
            aspect-ratio: 7 / 11; 
            font-weight: 700;
            color: #f8fafc;
            /* 建立 3D 舞台深度，數值越小立體感越強 */
            perspective: 400px; 
        }

        /* 4. 卡片基礎靜態樣式（上半與下半） */
        .card-panel {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background-color: #1e293b; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
            /* 隱藏背面，旋轉到背面時不顯示 */
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
        }

        /* 數字格式標準化 */
        .card-panel span {
            font-size: clamp(3.5rem, 16vw, 7.5rem); 
            position: absolute;
            height: 200%; 
            display: flex;
            align-items: center;
        }

        /* 上半部的定位 */
        .panel-top {
            top: 0;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.4); 
            transform-origin: bottom; /* 沿底邊向下翻轉 */
        }
        .panel-top span {
            top: 0;
        }

        /* 下半部的定位 */
        .panel-bottom {
            bottom: 0;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
            transform-origin: top; /* 沿頂邊向下翻轉 */
        }
        .panel-bottom span {
            bottom: 0;
        }

        /* 5. 翻頁動態疊加層定義 */
        /* 背景靜態層：顯示即將到來的「新數字」 */
        .bg-top { z-index: 1; }
        .bg-bottom { z-index: 1; }

        /* 前景動畫層：顯示原本的「舊數字」準備進行旋轉 */
        .fg-top { 
            z-index: 3; 
        }
        .fg-bottom { 
            z-index: 2; 
            transform: rotateX(90deg); /* 預先立起 90 度隱藏 */
        }

        /* 6. 動態觸發動畫類別 (由 JavaScript 控制開關) */
        .flip .fg-top {
            animation: flipTopAnim 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .flip .fg-bottom {
            animation: flipBottomAnim 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* 上半部舊數字向下蓋到平 (0度 ➡️ -90度) */
        @keyframes flipTopAnim {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-90deg); }
        }

        /* 下半部新數字從立起攤平 (90度 ➡️ 0度) */
        @keyframes flipBottomAnim {
            0% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }

        /* 7. 響應式冒號分隔符 */
        .separator {
            font-size: clamp(2.5rem, 12vw, 6rem);
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: blink 1s infinite;
            height: 100%;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        @media (max-width: 500px) {
            .clock-wrapper { gap: 1vw; }
            .flip-card { width: 13.5vw; }
        }
    </style>
</head>
<body>

    <div class="clock-wrapper">
        <!-- 小時 -->
        <div class="card-group">
            <div class="flip-card" id="h1">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
            <div class="flip-card" id="h2">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
        </div>
        
        <div class="separator">:</div>

        <!-- 分鐘 -->
        <div class="card-group">
            <div class="flip-card" id="m1">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
            <div class="flip-card" id="m2">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
        </div>

        <div class="separator">:</div>

        <!-- 秒鐘 -->
        <div class="card-group">
            <div class="flip-card" id="s1">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
            <div class="flip-card" id="s2">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
        </div>
    </div>

    <script>
        function updateCard(cardId, newValue) {
            const card = document.getElementById(cardId);
            
            // 獲取 4 個獨立面板的文字容器
            const bgTopSpan = card.querySelector('.bg-top span');
            const fgTopSpan = card.querySelector('.fg-top span');
            const fgBottomSpan = card.querySelector('.fg-bottom span');
            const bgBottomSpan = card.querySelector('.bg-bottom span');

            // 如果數字沒變，就不翻頁
            if (fgTopSpan.textContent === newValue) return;

            // 1. 先把「即將顯示的新數字」悄悄塞到最底層的背景版
            bgTopSpan.textContent = newValue;
            bgBottomSpan.textContent = newValue;

            // 2. 加上 .flip 啟動 CSS 3D 翻轉動畫（前半往下折、後半躺平）
            card.classList.add('flip');

            // 3. 當動畫執行完畢（0.6 秒後），重置卡片狀態，讓新數字變成下一次的舊數字
            setTimeout(() => {
                fgTopSpan.textContent = newValue;
                fgBottomSpan.textContent = newValue;
                card.classList.remove('flip');
            }, 550); // 稍微提早 0.05 秒清除，避免肉眼看到閃爍
        }

        function updateClock() {
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            updateCard('h1', hours[0]);
            updateCard('h2', hours[1]);
            updateCard('m1', minutes[0]);
            updateCard('m2', minutes[1]);
            updateCard('s1', seconds[0]);
            updateCard('s2', seconds[1]);
        }

        // 每秒檢查
        setInterval(updateClock, 1000);
        updateClock(); 
    </script>

</body>
</html>
