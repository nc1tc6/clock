<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的專屬翻頁時鐘 (Flip Clock)</title>
    <style>
        /* 1. 全螢幕黑夜背景與置中 */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* 防止滾動條出現 */
            background-color: #0f172a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        /* 2. 響應式時鐘外層包裹 */
        .clock-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 90vw; /* 限制最大寬度防止溢出 */
            max-width: 900px;
            gap: 1.5vw; /* 按比例縮放間距 */
        }

        /* 時、分、秒卡片組 */
        .card-group {
            display: flex;
            gap: 0.5vw;
        }

        /* 3. 核心 響應式 3D 卡片樣式 */
        .flip-card {
            position: relative;
            /* 使用 aspect-ratio 鎖定黃金比例，僅靠寬度即可響應縮放 */
            width: 11vw; 
            max-width: 110px;
            aspect-ratio: 7 / 11; 
            
            font-weight: 700;
            text-align: center;
            color: #f8fafc;
            border-radius: 1vw;
            max-border-radius: 8px;
            box-shadow: 0 1vw 3vw rgba(0, 0, 0, 0.5);
            perspective: 300px; 
        }

        /* 4. 自動置中與縮放的卡片半部 */
        .card-top, .card-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background-color: #1e293b; 
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
        }

        /* 運用 Flexbox 完美置中不同尺寸下的文字 */
        .card-top {
            top: 0;
            border-top-left-radius: 1vw;
            border-top-right-radius: 1vw;
            border-bottom: 1px solid rgba(0, 0, 0, 0.4); 
            align-items: flex-end; /* 文字下半切齊邊界 */
        }

        .card-bottom {
            bottom: 0;
            border-bottom-left-radius: 1vw;
            border-bottom-right-radius: 1vw;
            align-items: flex-start; /* 文字上半切齊邊界 */
        }

        /* 透過與外部容器高度相同的 line-height 達成完美字型縮放 */
        .card-top span, .card-bottom span {
            font-size: 15vw; /* 字體隨螢幕縮放 */
            font-size: clamp(3rem, 15vw, 7rem); /* 限制最大與最小字體 */
            line-height: 0;
        }
        
        .card-top span {
            transform: translateY(-0.15em); /* 微調文字垂直軸中心線 */
        }
        .card-bottom span {
            transform: translateY(-1.15em); /* 裁剪下半部文字對齊 */
        }

        /* 5. 響應式冒號分隔符 */
        .separator {
            font-size: clamp(2.5rem, 12vw, 6rem);
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: blink 1s infinite;
            padding-bottom: 1.5vw;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        /* 手機直向螢幕優化 (RWD) */
        @media (max-width: 500px) {
            .clock-wrapper {
                width: 95vw;
                gap: 1vw;
            }
            .flip-card {
                width: 13vw;
            }
        }
    </style>
</head>
<body>

    <div class="clock-wrapper">
        <!-- 小時 -->
        <div class="card-group">
            <div class="flip-card" id="h1"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
            <div class="flip-card" id="h2"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
        </div>
        
        <div class="separator">:</div>

        <!-- 分鐘 -->
        <div class="card-group">
            <div class="flip-card" id="m1"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
            <div class="flip-card" id="m2"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
        </div>

        <div class="separator">:</div>

        <!-- 秒鐘 -->
        <div class="card-group">
            <div class="flip-card" id="s1"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
            <div class="flip-card" id="s2"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
        </div>
    </div>

    <script>
        function updateCard(cardId, newValue) {
            const card = document.getElementById(cardId);
            const topSpan = card.querySelector('.card-top span');
            const bottomSpan = card.querySelector('.card-bottom span');

            if (topSpan.textContent === newValue) return;

            topSpan.textContent = newValue;
            bottomSpan.textContent = newValue;
        }

        function updateClock() {
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            updateCard('h1', hours[0]);
            updateCard('h2', hours[1]);
            updateCard('m1', minutes[0]);
            updateCard('m2', minutes[1]);
            updateCard('s1', seconds[0]);
            updateCard('s2', seconds[1]);
        }

        setInterval(updateClock, 1000);
        updateClock(); 
    </script>

</body>
</html>
