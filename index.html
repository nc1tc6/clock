<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的專屬翻頁時鐘 (Flip Clock)</title>
    <style>
        /* 1. 全螢幕黑夜背景 */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            background-color: #0f172a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        /* 2. 響應式時鐘外層包裹 */
        .clock-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 95vw; 
            max-width: 900px;
            gap: 1.5vw; 
        }

        /* 時、分、秒卡片組 */
        .card-group {
            display: flex;
            gap: 0.6vw;
        }

        /* 3. 核心 3D 卡片樣式 */
        .flip-card {
            position: relative;
            width: 12vw; 
            max-width: 100px;
            aspect-ratio: 7 / 11; /* 鎖定黃金比例 */
            font-weight: 700;
            color: #f8fafc;
            perspective: 300px; 
        }

        /* 4. 上下半部半透明容器（徹底解決切字問題的核心） */
        .card-top, .card-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden; /* 關鍵：靠這個自然裁切數字 */
            background-color: #1e293b; 
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
        }

        /* 數字本體：大尺寸、絕對居中 */
        .card-top span, .card-bottom span {
            font-size: 15vw; 
            font-size: clamp(3.5rem, 16vw, 7.5rem); /* 自動縮放字體 */
            position: absolute;
            height: 200%; /* 讓字體高度等於整張卡片 */
            display: flex;
            align-items: center;
        }

        /* 上半部：切齊頂端 */
        .card-top {
            top: 0;
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.4); 
        }
        .card-top span {
            top: 0; /* 數字從最頂端開始畫 */
        }

        /* 下半部：切齊底端 */
        .card-bottom {
            bottom: 0;
            border-bottom-left-radius: 8px;
            border-bottom-right-radius: 8px;
        }
        .card-bottom span {
            bottom: 0; /* 數字從最底端開始畫 */
        }

        /* 5. 響應式冒號分隔符 */
        .separator {
            font-size: clamp(2.5rem, 12vw, 6rem);
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: blink 1s infinite;
            height: 100%;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        /* 直向螢幕（如手機豎放）極致優化 */
        @media (max-width: 500px) {
            .clock-wrapper {
                gap: 1vw;
            }
            .flip-card {
                width: 13.5vw;
            }
        }
    </style>
</head>
<body>

    <div class="clock-wrapper">
        <!-- 小時 -->
        <div class="card-group">
            <div class="flip-card" id="h1"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
            <div class="flip-card" id="h2"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
        </div>
        
        <div class="separator">:</div>

        <!-- 分鐘 -->
        <div class="card-group">
            <div class="flip-card" id="m1"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
            <div class="flip-card" id="m2"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
        </div>

        <div class="separator">:</div>

        <!-- 秒鐘 -->
        <div class="card-group">
            <div class="flip-card" id="s1"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
            <div class="flip-card" id="s2"><div class="card-top"><span>0</span></div><div class="card-bottom"><span>0</span></div></div>
        </div>
    </div>

    <script>
        function updateCard(cardId, newValue) {
            const card = document.getElementById(cardId);
            const topSpan = card.querySelector('.card-top span');
            const bottomSpan = card.querySelector('.card-bottom span');

            if (topSpan.textContent === newValue) return;

            topSpan.textContent = newValue;
            bottomSpan.textContent = newValue;
        }

        function updateClock() {
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            updateCard('h1', hours[0]);
            updateCard('h2', hours[1]);
            updateCard('m1', minutes[0]);
            updateCard('m2', minutes[1]);
            updateCard('s1', seconds[0]);
            updateCard('s2', seconds[1]);
        }

        setInterval(updateClock, 1000);
        updateClock(); 
    </script>

</body>
</html>
