<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的專屬翻頁時鐘 (Flip Clock)</title>
    <style>
        /* 1. 全螢幕黑夜背景 */
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            overflow: hidden; 
            background-color: #0f172a; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        /* 2. 響應式時鐘外層包裹 */
        .clock-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 95vw; 
            max-width: 1400px; /* 放大外框最大限制，允許卡片擴展 */
            gap: 1.5vw; 
        }

        /* 時、分、秒卡片組 */
        .card-group {
            display: flex;
            gap: 0.6vw;
        }

        /* 3. 核心 3D 卡片容器 */
        .flip-card {
            position: relative;
            width: 12.5vw; /* 稍微加寬卡片佔比 */
            max-width: 170px; /* 提升大螢幕下的卡片最大寬度 (原為 100px) */
            aspect-ratio: 7 / 11; 
            font-weight: 800; /* 加粗字體讓視覺更強烈 */
            color: #f8fafc;
            perspective: 500px; /* 配合大卡片調整 3D 深度 */
        }

        /* 4. 卡片基礎靜態樣式（上半與下半） */
        .card-panel {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background-color: #1e293b; 
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
            display: flex;
            justify-content: center;
            backface-visibility: hidden; 
            -webkit-backface-visibility: hidden;
        }

        /* 數字格式標準化 - 大幅提升最大字型 */
        .card-panel span {
            /* 調整 clamp 參數：最小 3.5rem，隨螢幕縮放 16vw，最大放大至 12.5rem */
            font-size: clamp(3.5rem, 16vw, 12.5rem); 
            position: absolute;
            height: 200%; 
            display: flex;
            align-items: center;
        }

        /* 上半部的定位 */
        .panel-top {
            top: 0;
            border-top-left-radius: 12px; /* 隨卡片變大增加圓角 */
            border-top-right-radius: 12px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.4); 
            transform-origin: bottom; 
        }
        .panel-top span {
            top: 0;
        }

        /* 下半部的定位 */
        .panel-bottom {
            bottom: 0;
            border-bottom-left-radius: 12px;
            border-bottom-right-radius: 12px;
            transform-origin: top; 
        }
        .panel-bottom span {
            bottom: 0;
        }

        /* 5. 翻頁動態疊加層定義 */
        .bg-top { z-index: 1; }
        .bg-bottom { z-index: 1; }

        .fg-top { z-index: 3; }
        .fg-bottom { 
            z-index: 2; 
            transform: rotateX(90deg); 
        }

        /* 6. 動態觸發動畫類別 */
        .flip .fg-top {
            animation: flipTopAnim 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .flip .fg-bottom {
            animation: flipBottomAnim 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes flipTopAnim {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-90deg); }
        }

        @keyframes flipBottomAnim {
            0% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }

        /* 7. 響應式冒號分隔符 */
        .separator {
            font-size: clamp(2.5rem, 12vw, 10rem); /* 同步放大冒號尺寸 */
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: blink 1s infinite;
            height: 100%;
        }

        @keyframes blink {
            50% { opacity: 0.3; }
        }

        /* 直向螢幕（如手機豎放）優化保持不破版 */
        @media (max-width: 500px) {
            .clock-wrapper { gap: 1vw; }
            .flip-card { width: 13.5vw; }
        }
    </style>
</head>
<body>

    <div class="clock-wrapper">
        <!-- 小時 -->
        <div class="card-group">
            <div class="flip-card" id="h1">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
            <div class="flip-card" id="h2">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
        </div>
        
        <div class="separator">:</div>

        <!-- 分鐘 -->
        <div class="card-group">
            <div class="flip-card" id="m1">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
            <div class="flip-card" id="m2">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
        </div>

        <div class="separator">:</div>

        <!-- 秒鐘 -->
        <div class="card-group">
            <div class="flip-card" id="s1">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
            <div class="flip-card" id="s2">
                <div class="card-panel panel-top bg-top"><span>0</span></div>
                <div class="card-panel panel-top fg-top"><span>0</span></div>
                <div class="card-panel panel-bottom fg-bottom"><span>0</span></div>
                <div class="card-panel panel-bottom bg-bottom"><span>0</span></div>
            </div>
        </div>
    </div>

    <script>
        function updateCard(cardId, newValue) {
            const card = document.getElementById(cardId);
            
            const bgTopSpan = card.querySelector('.bg-top span');
            const fgTopSpan = card.querySelector('.fg-top span');
            const fgBottomSpan = card.querySelector('.fg-bottom span');
            const bgBottomSpan = card.querySelector('.bg-bottom span');

            if (fgTopSpan.textContent === newValue) return;

            bgTopSpan.textContent = newValue;
            bgBottomSpan.textContent = newValue;

            card.classList.add('flip');

            setTimeout(() => {
                fgTopSpan.textContent = newValue;
                fgBottomSpan.textContent = newValue;
                card.classList.remove('flip');
            }, 550); 
        }

        function updateClock() {
            const now = new Date();
            
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            updateCard('h1', hours[0]);
            updateCard('h2', hours[1]);
            updateCard('m1', minutes[0]);
            updateCard('m2', minutes[1]);
            updateCard('s1', seconds[0]);
            updateCard('s2', seconds[1]);
        }

        setInterval(updateClock, 1000);
        updateClock(); 
    </script>

</body>
</html>
